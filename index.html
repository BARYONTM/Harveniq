<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harveniq | CNC İşleme ve Endüstriyel Üretim Çözümleri</title>
    <meta name="description" content="CNC işleme ve özel parça üretimde hızlı teklif, termin odaklı üretim ve kalite kontrol. Teknik çiziminizi gönderin, teklifinizi hızla alın." />
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- SEO and Social tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://harveniq.com/" />
    <meta property="og:title" content="Harveniq | Yüksek Kalite CNC İşleme ve Endüstriyel Çözümler" />
    <meta property="og:description" content="Endüstriyel parça üretiminde güvenilir çözüm ortağınız. Hızlı teklif ve tam zamanında teslimat ile yüksek hassasiyetli talaşlı imalat hizmetleri." />
    <meta property="og:image" content="https://harveniq.com/images/hero_bg.png" />
    <!-- Dinamik Canonical (Google Cift Sayfa Kopyasi Uyarilarini Duzeltmek Icin) -->
    <script>
      var canonicalUrl = window.location.href.split('?')[0].replace(/\/$/, ""); 
      var link = document.createElement("link");
      link.setAttribute("rel", "canonical");
      link.setAttribute("href", canonicalUrl);
      document.head.appendChild(link);
    </script>
  </head>
  <body>
    <!-- Google Structured Data (Sitelinks ve Arama Kayıtları İçin Teknik Altyapı) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Harveniq",
        "url": "https://harveniq.com/"
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
